<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disposições Comuns</title>
    <style>
        :root {
            --primary: #008080;
            --success: #28a745;
            --error: #dc3545;
            --background: #f4f7f6;
            --card-bg: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1 {
            text-align: center;
            color: var(--primary);
            padding-bottom: 10px;
        }
        .top-reset {
            display: flex;
            justify-content: center;
            margin: 15px 0 10px;
            gap: 10px;
        }
        .top-reset button {
            background-color: var(--primary);
            color: #fff;
            border: none;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4em;
            cursor: pointer;
        }
        .top-reset button:hover {
            filter: brightness(0.9);
        }
        .info {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
            text-align: center;
        }
        .question-card {
            background: var(--card-bg);
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .question-title {
            font-weight: 600;
            font-size: 1.2em;
            margin-bottom: 15px;
            color: #2c3e50;
        }
        .options {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .options li {
            margin-bottom: 10px;
        }
        .option-label {
            display: flex;
            align-items: baseline;
            padding: 15px;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-size: 1.1em;
        }
        .option-label:hover:not(.disabled) {
            background-color: #e2e6ea;
        }
        .option-label.disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }
        .option-label input {
            margin-right: 15px;
            transform: translateY(2px);
        }
        .btn {
            display: block;
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.2em;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        .btn:hover:not(:disabled) {
            filter: brightness(0.85);
        }
        .btn:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
            opacity: 0.7;
        }
        .btn-next {
            background-color: #17a2b8;
        }
        .btn-next:hover:not(:disabled) {
            background-color: #138496;
            filter: none;
        }
        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 5px;
            font-weight: bold;
            display: none;
            font-size: 1.1em;
        }
        .feedback.correct {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .feedback.incorrect {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        .option-correct {
            background-color: #d4edda !important;
            border-color: var(--success) !important;
        }
        .option-incorrect {
            background-color: #f8d7da !important;
            border-color: var(--error) !important;
        }
        #results {
            background: var(--card-bg);
            padding: 30px;
            margin-top: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            display: none;
        }
        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            font-weight: bold;
            margin: 0 auto 20px;
        }
        .stat-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .stat {
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1.1em;
        }
        .stat-correct { background-color: #d4edda; color: #155724; }
        .stat-incorrect { background-color: #f8d7da; color: #721c24; }
        .progress-container {
            margin-bottom: 20px;
            font-weight: bold;
            text-align: center;
            font-size: 1.2em;
            color: var(--primary);
        }
        .nav-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        .btn-icon {
            width: 46px;
            height: 46px;
            padding: 0;
            font-size: 1.4em;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <h1>Disposições Comuns</h1>
    <div class="top-reset">
        <button type="button" onclick="restartQuiz()" aria-label="Reiniciar questionário">&#x21BB;</button>
        <button type="button" id="btn-continue-top" onclick="continueQuiz()" aria-label="Continuar a responder" style="display: none;">&#x21AA;</button>
        <button type="button" id="btn-results-top" onclick="showResults()" aria-label="Ver resultados finais" style="display: none;">&#x1F4CB;</button>
        <button type="button" onclick="window.location.href='index.html'" aria-label="Voltar à página inicial">&#x2302;</button>
    </div>
    
    <div class="info" id="intro-screen">
        <p>Este questionário interativo contém 50 perguntas baseadas no Capítulo IV - Disposições Comuns, e Tabelas Anexas.</p>
        <p><strong>Modo Sequencial:</strong> Terá de responder a uma pergunta de cada vez para poder avançar.</p>
        <button class="btn" onclick="startQuiz()">Iniciar Questionário</button>
        <button class="btn btn-next" style="margin-top: 10px;" onclick="window.location.href='index.html'">Voltar à página inicial</button>
    </div>

    <div id="quiz-screen" style="display: none;">
        <div class="progress-container">
            Pergunta <span id="current-q-num">1</span> de <span id="total-q-num">50</span>
        </div>
        
        <div class="question-card" id="question-card">
            <div class="question-title" id="question-text"></div>
            <ul class="options" id="options-list"></ul>
            <div class="feedback" id="feedback-msg"></div>
        </div>

        <button type="button" class="btn" id="btn-submit" onclick="submitAnswer()">Responder</button>
        <div class="nav-controls">
            <button type="button" class="btn btn-next btn-icon" id="btn-prev-nav" onclick="prevQuestionNav()" aria-label="Pergunta anterior">&#x276E;</button>
            <button type="button" class="btn btn-next btn-icon" onclick="window.location.href='index.html'" aria-label="Voltar à página inicial">&#x2302;</button>
            <button type="button" class="btn btn-next btn-icon" id="btn-next-nav" onclick="nextQuestionNav()" aria-label="Próxima pergunta">&#x276F;</button>
        </div>
    </div>

    <div id="results">
        <h2>Resultados Finais</h2>
        <div class="score-circle" id="score-circle">0%</div>
        <div class="stat-row">
            <div class="stat stat-correct">Certas: <span id="count-correct">0</span></div>
            <div class="stat stat-incorrect">Erradas: <span id="count-incorrect">0</span></div>
        </div>
    </div>

    <script>
        const quizData = [
            { q: "O serviço de exames, que engloba as provas ModA e os exames finais nacionais, é:", o: ["A) Facultativo para todos os professores", "B) Obrigatório apenas para professores relatores", "C) De aceitação obrigatória para todos os intervenientes referidos (vigilantes, classificadores, etc.)", "D) Voluntário mediante pagamento extra"], a: 2 },
            { q: "Qual destes deveres é imposto a TODOS os intervenientes no processo de avaliação externa?", o: ["A) Corrigir provas", "B) Dever de sigilo", "C) Acompanhar alunos ao WC", "D) Prestar declarações à imprensa escolar"], a: 1 },
            { q: "O anonimato dos professores classificadores e relatores das provas e processos de reapreciação é assegurado por quem?", o: ["A) Apenas pelo Diretor da Escola", "B) Por todos e a todos os intervenientes", "C) Exclusivamente pelos serviços informáticos (JNE)", "D) Não existe tal anonimato"], a: 1 },
            { q: "Constitui um direito dos professores classificadores:", o: ["A) Prioridade nas funções de classificação sobre quaisquer outras atividades da escola, exceto atividades letivas e reuniões de avaliação", "B) Receberem isenção total de qualquer outra reunião", "C) Acesso livre aos dados pessoais do aluno", "D) Recusa justificada na correção"], a: 0 },
            { q: "A marcação de férias dos professores que integram as bolsas de classificadores pode ser autorizada pelo diretor, mas tem restrições em que períodos?", o: ["A) Nos finais de semana de julho", "B) Em dezembro e janeiro", "C) Não pode incluir os períodos de classificação e de aplicação da componente oral para as quais sejam convocados", "D) Estão totalmente impedidos de marcar férias de verão"], a: 2 },
            { q: "Perante uma suspeita de fraude na classificação das respostas dadas pelo aluno durante o processo de correção (classificadores), o professor deve:", o: ["A) Anular a prova automaticamente", "B) Comunicar ao responsável de agrupamento do JNE através de relatório devidamente fundamentado", "C) Falar diretamente com o Conselho Executivo", "D) Apenas dar 0 valores à questão"], a: 1 },
            { q: "Nas escolas onde se realizam provas ou exames nacionais, quem é o responsável primário e supervisor pelo Secretariado de exames?", o: ["A) O Chefe de Secretaria", "B) O Diretor", "C) O Delegado de Saúde", "D) O Inspetor de Educação Local"], a: 1 },
            { q: "O material autorizado nas provas e exames é exclusivamente o discriminado onde?", o: ["A) No programa letivo entregue no início do ano", "B) Pelo Professor de disciplina verbalmente", "C) Nas informações publicadas num edital da escola", "D) Na Informação-Prova de cada prova/código e nas informações complementares"], a: 3 },
            { q: "O uso de dicionários unilingues e ou bilingues, em suporte papel, nas provas:", o: ["A) É proibido em todas as provas nacionais", "B) É universal e livre em qualquer exame", "C) É definido através das Informações-Prova das respetivas disciplinas", "D) É uma decisão do vigilante no momento da prova"], a: 2 },
            { q: "A presença, junto dos alunos a realizar exame, de um relógio com comunicação à distância (mesmo desligado) constitui:", o: ["A) Uma infração leve, alvo de aviso", "B) Uma mera distração autorizada", "C) Uma irregularidade ou fraude", "D) Uma infração passível de prisão civil"], a: 2 },
            { q: "O registo de quaisquer expressões desrespeitosas na folha da prova do aluno constitui:", o: ["A) Uma irregularidade e ou fraude", "B) Um direito de liberdade de expressão tolerado", "C) Um erro descontado na cotação de português", "D) Lixo sem consequência regulamentar"], a: 0 },
            { q: "A anulação de uma prova por irregularidades identificadas na situação de material não autorizado é da competência legal do:", o: ["A) Presidente do JNE", "B) Reitor nacional", "C) Vigilante de sala", "D) Diretor de escola"], a: 3 },
            { q: "Quando alunos cometem ou tentam cometer fraude durante a prova, eles:", o: ["A) Abandonam a sala imediatamente e de forma discreta", "B) A prova é suspensa mas não podem abandonar a sala até ao fim do tempo de duração da mesma", "C) São transferidos para uma sala isolada de fraude", "D) Recebem um novo enunciado para tentar de novo com 0 de partida"], a: 1 },
            { q: "Uma anulação de exame na 1.ª fase por fraude (da responsabilidade do aluno) impede a sua inscrição para a 2.ª fase do exame nesse mesmo ano escolar?", o: ["A) Sim, impede totalmente a repetição ou recurso na 2.ª fase dessa prova no mesmo ano", "B) Não, a 2.ª fase serve exatamente para estas ocorrências", "C) Só impede se for fraude reiterada", "D) Impede, mas com pagamento de multa de 50€ pode inscrever-se"], a: 0 },
            { q: "Sempre que o JNE autorizar a título excecional a 'repetição' de exames nas fases, isso obriga que:", o: ["A) A prova inicial tenha de ser anulada antes da publicação das classificações", "B) A nota mais alta de ambas seja contabilizada", "C) As duas provas originem uma média percentual final", "D) O aluno pague a dobrar os seguros"], a: 0 },
            { q: "Pode o aluno ter de lidar com anulação 'Apenas Geral' de provas (que anule para todos) no art 94º por fraude sistemática/descoberta superveniente? A quem caberá ditar tal fatalidade se ocorrer a título massivo?", o: ["A) Ao coordenador das línguas da escola no dia da deteção num conselho informal isolado", "B) Despacho do Presidente JNE anula localmente a alunos (caso a caso) mas generalizado a todos é do Ministro da Educação, Ciências", "C) A anulação global não existe", "D) Ao Presidente da República em Diário da República unicamente"], a: 1 },
            { q: "Os praticantes desportivos de alto rendimento podem requerer provas de época especial (agosto). Até quando deve o encarregado/aluno entregar ao diretor o requerimento?", o: ["A) Até 29 de maio", "B) Até ao final de abril", "C) Em qualquer momento", "D) Até 1 de julho"], a: 0 },
            { q: "Qual a entidade responsável pela validação clínica/estatuto de atleta de alto rendimento submetido pelo JNE para validação?", o: ["A) Associação Portuguesa de Futebol", "B) Câmara Municipal do desporto", "C) Instituto Português do Desporto e Juventude, I.P.", "D) Comité Olímpico de Portugal"], a: 2 },
            { q: "Na confirmação de que vai aos exames em época especial de praticante desportivo, após autorização, é exigido ao encarregado/aluno:", o: ["A) Assinatura de confissão de dados", "B) O depósito de 25 euros, independente do n.º de exames (reembolsável após realização)", "C) O pagamento de 25 euros não reembolsáveis", "D) Frequência na escola de agosto"], a: 1 },
            { q: "Se o aluno da época especial desportiva faltar aos exames na referida época especial para a qual pagou caução:", o: ["A) Os 25 euros são-lhe perdoados/devolvidos via CTT", "B) Implica a não devolução da quantia depositada, passando a receita da escola", "C) Tem justificação médica validada sempre a posteriori", "D) Vai responder a inquérito da Inspeção"], a: 1 },
            { q: "Qual o custo estabelecido pela época especial para os atletas de alto rendimento pagarem enquanto ato de depósito de confirmação por disciplinas/total?", o: ["A) 10 euros por disciplina em causa até máximo 30e", "B) 25 euros pelo ato/total (independente do número de provas a realizar na época), devolvido após as fazer", "C) 50 euros cativos sem devoluções", "D) Apenas o IRS"], a: 1 },
            { q: "Qual dos seguintes grupos, de acordo com o Regulamento, não está contemplado com a hipótese de aceder especificamente a épocas especiais de exames na mesma alínea?", o: ["A) Mães estudantes", "B) Grávidas", "C) Pais estudantes", "D) Alunos em férias comprovadas no estrangeiro"], a: 3 },
            { q: "Os militares em regimes de contrato (RC, RCE ou RV) podem ter época especial de exames?", o: ["A) Apenas se a Pátria recomendar superiormente ao ministério", "B) Não têm acesso especial sob justificação militar", "C) Sim, se por motivos operacionais do diploma legal não puderem prestar na época normal", "D) Apenas se forem generais"], a: 2 },
            { q: "Se for um Estudante Grávida pode justificar o acesso à 2ª Fase dos exames no Secundário/Básico ou tem um estatuto protetor na 1ª fase isolado?", o: ["A) Grávidas não podem ir aos exames se o filho já nasceu no mês corrente da aprovação.", "B) Podem aceder ao regime de Época Especial para prestação de Exames / Provas a esse título de lei", "C) Têm apenas perdões de classificação no Básico e perdem para a Nacional", "D) Entram automáticas mas com faltas nos certificados"], a: 1 },
            { q: "Para o prosseguimento regular dos processos Exames Especiais Desportivos e os Exames que requeiram depósitos, de que forma o Tratamento Dos Dados cumpre diretrizes (Artigo 97)?", o: ["A) Obedecem a preenchimento sem ressalvas na plataforma cívica do conselho local", "B) Na defesa do tratamento apenas à lei do JNE", "C) Rege-se aos princípios da licitude, proporcionalidade, defense garantindo a lei LGPD/GPDR", "D) São públicos nos corredores do IPDJ no final"], a: 2 },
            { q: "Os montantes devidos por professores relatores pela reapreciação de exames e custos do processo nos normativos são regulados por quem/quê?", o: ["A) Disposições financeiras e despachos do membro do governo que tutela a área", "B) Pelo Diretor regional da autonomia escolar associada", "C) Pela FENPROF em convenção anual", "D) Por livre trânsito e com base no salário da escola a cargo"], a: 0 },
            { q: "Constitui uma Prova de Tipo 'P' nas tabelas a designação de:", o: ["A) Prova Polivalente", "B) Prova Prática (envolvendo manipulação experimental, instrumentos, etc e júri de observação)", "C) Prova de Produção", "D) Programação Web"], a: 1 },
            { q: "As provas ModA (Monitorização da Aprendizagem) no 4.º ano, à disciplina de Português (41) tem a duração de:", o: ["A) 90 minutos", "B) 105 minutos", "C) 120 minutos", "D) 60 minutos"], a: 1 },
            { q: "No âmbito da prova ModA do 4.º ano de Ciências Naturais (49) [no mapa 2028], a duração da prova escrita referida na matriz de anexos é de:", o: ["A) 60 min", "B) 90 min", "C) 105 min", "D) 120 min"], a: 2 },
            { q: "No escalonamento ModA para PLNM, o nível iniciação é constituído pelos módulos:", o: ["A) B1 e B2", "B) C1 e C2", "C) Nível zero ou A1/A2", "D) Apenas B1"], a: 2 },
            { q: "A prova oral das provas ModA de PLNM de iniciação de 4º e 6º ano, não deve exceder um limite temporal. Qual?", o: ["A) 15 minutos", "B) 5 minutos", "C) 10 minutos", "D) 20 minutos"], a: 1 },
            { q: "No 6.º ano, a prova ModA de Inglês (65) possui uma duração letiva de prova distribuída por:", o: ["A) 90 min (Escrita)", "B) 95 min (Escrita) + 10 min (Oral)", "C) 105 min absolutos (Escrita)", "D) 90 min (Escrita) + 15 min (Oral)"], a: 1 },
            { q: "A prova 'ModA de Português Língua Segunda (44 ou 62)' destina-se a focar que estrato sociológico de alunos estritamente no Básico?", o: ["A) Exclusivo para estrangeiros recém-chegados", "B) Apenas a situações de surdez severa a profunda", "C) Exclusivo de invisuais totais", "D) Apenas disléxicos"], a: 1 },
            { q: "A prova de 'Português Língua Não Materna (63) - nível A2' do 6.º ano inclui vertente prática na ModA de quanto tempo em minutos regulamentares totais referenciados nos quadros?", o: ["A) 100 min Escrita + 5 min Oral", "B) 90 min Escrita + 15 min Oral", "C) 105 min Integrais sem limite", "D) 95 min + 10 min"], a: 0 },
            { q: "De acordo com as Disposições dos quadros Prazos de inscrição (Básico), alunos que frequentem o 9º ano geral (internos, normais):", o: ["A) Devem pagar inscrição até 19 de Março", "B) Inscrevem-se obrigatoriamente entre 6 a 19 marco", "C) Não necessitam de inscrição", "D) Inscrições em julho na fase 2"], a: 2 },
            { q: "No quadro IV respeitante a provas Finais de Básico de 9.º ano, qual o tempo de prova previsto e a tolerância regulamentada para Português (91)?", o: ["A) 90 minutos de realização + 30 min tolerância", "B) 120 minutos de realização integral sem tolerâncias", "C) 105 minutos realização + 15 min tolerância", "D) 60 minutos realização + 30 min de tolerância"], a: 0 },
            { q: "As provas orais do Ensino Básico de Equivalência à Frequência nos 1.º 2.º e 3.º ciclos (referências a, b... no quadro), exceto algumas exceções fixadas, são limitadas a quanto tempo máximo e de que natureza externa?", o: ["A) 15 minutos, à porta fechada (restritas)", "B) 5 minutos livres a público", "C) 15 minutos e são abertas à assistência do público", "D) O tempo é livre, mas confidenciais"], a: 2 },
            { q: "A prova (Exame) a nível de escola de equivalência a exames finais de 'Inglês (450 - iniciação)' destina-se a quem?", o: ["A) Estudantes que chumbam Inglês", "B) Exclusivamente a alunos de sistemas estrangeiros que não frequentaram a disciplina homóloga em percurso equivalente ao básico", "C) Apenas a estudantes disléxicos", "D) Jovens praticantes de alto rendimento"], a: 1 },
            { q: "No 1º Ciclo, a prova de equivalência a frequência PEF de 'Educação Física' ocorre:", o: ["A) Em 90 minutos escritos e com observação", "B) Em 45 minutos essencialmente base prática (P)", "C) A disciplina já não existe nos regulamentos de aprovação e de exames por dispensa nacional em decreto recente", "D) Apenas com um teste de Cooper"], a: 1 },
            { q: "Para os Exames finais nacionais (Ensino Secundário), no panorama dos Cursos Científico-Humanísticos gerais, a inscrição na 1.ª fase como interno tem um prazo geralmente estipulado em base (Ex: tabela 2026/2027) entre:", o: ["A) Fim de Junho", "B) Primeiros dias até meio/final da 3.ª semana de Março (e.g. 6 a 19 de março, 5 a 18 março)", "C) Todo o mês de fevereiro", "D) Início de Julho (época estival)"], a: 1 },
            { q: "Os Exames nacionais da via Científico-Humanística do 12.º ano das disciplinas de Biologia e Geologia e de Física e Química A (11.ºano) têm respetivamente duração e tolerância de:", o: ["A) 150 min (sem tolerância)", "B) 120 minutos e 30 minutos de tolerância", "C) 90 minutos e 30 minutos tolerância", "D) 120 min + 15 min de tolerância"], a: 1 },
            { q: "Quais os alunos que têm como obrigatório inscrever-se para a Fase 1 (Exames Fin. Nacionais) sob o panorama geral indicado nas regras/quadros?", o: ["A) Somente alunos com mais de 18 anos", "B) Somente os autopropostos isolados", "C) Obrigatório para todos os alunos em currículos correntes (como cond. aos exames)", "D) A 1.ª fase é facultativa por despachos avulsos"], a: 2 },
            { q: "Que tipos de prova constituem os Exames Finais Nacionais (Cursos Secundário) mencionados nas alíneas explicativas?", o: ["A) Prova Escrita (E) e Prova Prática (P)", "B) Provas Online Exclusivas", "C) Prova escrita (E) e Prova oral (O)", "D) Prova digital, Prática Exclusiva, Entrevista"], a: 2 },
            { q: "Um Aluno Interno nos Cursos Científico-Humanísticos no Ensino Secundário que queira mudar a opção de disciplina sujeita a exame de 12.º para a conclusão (CFD).", o: ["A) Apenas requer nos 6 meses prévios e paga sobretaxa de juro", "B) Não o pode fazer após os 18 anos civis", "C) Tem como limite o Último dia do 3.º Período na escola", "D) Decorre a alteração a qualquer momento online sem entraves do diretor"], a: 2 },
            { q: "Para o cálculo ou tipologias das Provas de Equivalência à Frequência de secundário (PEF Secundário, ex: Quadro VIII), as disciplinas com comp. prática: Física, Química e Biologia têm cota de Componente Prática de:", o: ["A) 20%", "B) 50%", "C) 15% apenas teórica", "D) Tem 90 minutos Escrita e 90 minutos Prática (+30min de tolerância destas)", "E) - Alternativa correta da outra lista: 30% componente final (e duração E+P = 90+90)"], a: 4 },
            { q: "Na ponderação específica das classificações da disciplina de Educação Física na Via Artística/Humanística em Provas Equivalência (PEF, Secundário), qual a distribution Escrita / Prática?", o: ["A) Escrita 30% / Prática 70%", "B) Escrita 70% / Prática 30%", "C) Escrita 50% / Prática 50%", "D) Prática a 100%"], a: 0 },
            { q: "Qual a duração da PEF (Prova Equivalência à Freq.) de História B (secundário) segundo a matriz se esta ocorrer nos padrões dos Quadros (comparativamente a Filosofia ou Grego)?", o: ["A) 120 minutos", "B) 90 minutos", "C) 150 minutos", "D) 60 minutos"], a: 1 },
            { q: "Nos quadros de Equivalência à Frequência Secundário de Cursos Artísticos, de forma a exemplificar durações pesadas, as disciplinas Específicas de Desenho A (206) ou Geometria Descritiva A duram quanto?", o: ["A) 120 minutos", "B) 60 minutos", "C) 150 minutos (Escrita)", "D) 100 minutos"], a: 2 },
            { q: "Na ponderação do quadro X referente aos Exames de línguas a nível de escola Francês (317 - iniciação), como pesa a prova?", o: ["A) 70% escrita e 30% oral", "B) 50/50 % igual", "C) Componente Escrita (80%) e Componente Oral (20%)", "D) Escrita a 100% sem componente oral na avaliação final da Frequência Nacional"], a: 2 },
            { q: "O JNE atua preferencialmente usando métodos de divulgação online no despacho e no tratamento. Onde é afixado tradicionalmente as informações de Exames?", o: ["A) Direção Regional e Câmaras", "B) Através das vias da escola informadas pelo Diretor via Secretariado de exames", "C) Sempre nos perfis de redes sociais das associações de país", "D) Entregue em mão aos alunos com notificação escrita do Reitor"], a: 1 }
        ];

        const STORAGE_KEY = 'quiz_comuns_state_v1';

        let currentQuestionIndex = 0;
        let correctCount = 0;
        let incorrectCount = 0;
        let answered = false;
        let selectedIndexForCurrent = null;
        let answers = new Array(quizData.length).fill(null);

        function updateNavButtons() {
            const prevBtn = document.getElementById('btn-prev-nav');
            const nextBtn = document.getElementById('btn-next-nav');
            if (!prevBtn || !nextBtn) return;

            prevBtn.disabled = currentQuestionIndex === 0;
            nextBtn.disabled = currentQuestionIndex === quizData.length - 1;
        }

        function saveState(extra = {}) {
            const state = {
                currentQuestionIndex,
                correctCount,
                incorrectCount,
                answered,
                selectedIndex: selectedIndexForCurrent,
                answers,
                totalQuestions: quizData.length,
                ...extra
            };
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            } catch (e) {
                // ignorar falhas de armazenamento
            }
        }

        function clearState() {
            try {
                localStorage.removeItem(STORAGE_KEY);
            } catch (e) {}
        }

        function restartQuiz() {
            clearState();
            location.reload();
        }

        function continueQuiz() {
            document.getElementById('results').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            document.getElementById('btn-continue-top').style.display = 'none';
            document.getElementById('btn-results-top').style.display = 'flex';
            saveState({ started: true, finished: false });
        }
        function startQuiz() {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            document.getElementById('total-q-num').textContent = quizData.length;
            currentQuestionIndex = 0;
            correctCount = 0;
            incorrectCount = 0;
            answered = false;
            selectedIndexForCurrent = null;
            answers = new Array(quizData.length).fill(null);
            showQuestion();
            document.getElementById('btn-continue-top').style.display = 'none';
            document.getElementById('btn-results-top').style.display = 'flex';
            saveState({ started: true, finished: false });
        }

        function renderAnsweredState(storedAnswer) {
            const qData = quizData[currentQuestionIndex];
            const feedbackEl = document.getElementById('feedback-msg');

            document.querySelectorAll('.option-label').forEach(label => label.classList.add('disabled'));
            document.querySelectorAll('input[name="current-q"]').forEach(input => {
                input.disabled = true;
                if (storedAnswer && parseInt(input.value) === storedAnswer.selectedIndex) {
                    input.checked = true;
                }
            });

            document.getElementById('label-opt-' + qData.a).classList.add('option-correct');

            if (storedAnswer && storedAnswer.selectedIndex === qData.a) {
                feedbackEl.textContent = "Resposta Correta!";
                feedbackEl.className = "feedback correct";
            } else if (storedAnswer) {
                document.getElementById('label-opt-' + storedAnswer.selectedIndex).classList.add('option-incorrect');
                const correctLetter = qData.o[qData.a] ? qData.o[qData.a].charAt(0) : '';
                feedbackEl.textContent = "Resposta Incorreta! A opção correta é a " + correctLetter + ".";
                feedbackEl.className = "feedback incorrect";
            }

            document.getElementById('btn-submit').style.display = 'none';
        }

        function showQuestion() {
            answered = false;
            selectedIndexForCurrent = null;
            const qData = quizData[currentQuestionIndex];
            
            document.getElementById('current-q-num').textContent = currentQuestionIndex + 1;
            document.getElementById('question-text').textContent = (currentQuestionIndex + 1) + ". " + qData.q;
            
            const optionsList = document.getElementById('options-list');
            optionsList.innerHTML = '';
            
            qData.o.forEach((opt, index) => {
                const li = document.createElement('li');
                li.innerHTML = '<label class="option-label" id="label-opt-' + index + '">' +
                        '<input type="radio" name="current-q" value="' + index + '">' +
                        '<span>' + opt + '</span>' +
                    '</label>';
                optionsList.appendChild(li);
            });
            
            document.getElementById('feedback-msg').style.display = 'none';
            document.getElementById('feedback-msg').className = 'feedback';
            
            document.getElementById('btn-submit').style.display = 'block';
            document.getElementById('btn-submit').disabled = false;

            const storedAnswer = answers[currentQuestionIndex];
            if (storedAnswer) {
                answered = true;
                selectedIndexForCurrent = storedAnswer.selectedIndex;
                document.getElementById('feedback-msg').style.display = 'block';
                renderAnsweredState(storedAnswer);
            }

            updateNavButtons();
        }

        function submitAnswer() {
            if (answered) return;
            
            const selectedOpt = document.querySelector('input[name="current-q"]:checked');
            if (!selectedOpt) {
                alert("Por favor, selecione uma opção antes de responder.");
                return;
            }
            
            answered = true;
            document.getElementById('btn-submit').disabled = true;
            
            const selectedIndex = parseInt(selectedOpt.value);
            const qData = quizData[currentQuestionIndex];
            const feedbackEl = document.getElementById('feedback-msg');
            
            document.querySelectorAll('.option-label').forEach(label => label.classList.add('disabled'));
            document.querySelectorAll('input[name="current-q"]').forEach(input => input.disabled = true);
            
            document.getElementById('label-opt-' + qData.a).classList.add('option-correct');
            
            if (selectedIndex === qData.a) {
                correctCount++;
                feedbackEl.textContent = "Resposta Correta!";
                feedbackEl.className = "feedback correct";
                answers[currentQuestionIndex] = { selectedIndex, isCorrect: true };
            } else {
                incorrectCount++;
                document.getElementById('label-opt-' + selectedIndex).classList.add('option-incorrect');
                const correctLetter = qData.o[qData.a] ? qData.o[qData.a].charAt(0) : '';
                feedbackEl.textContent = "Resposta Incorreta! A opção correta é a " + correctLetter + ".";
                feedbackEl.className = "feedback incorrect";
                answers[currentQuestionIndex] = { selectedIndex, isCorrect: false };
            }
            
            document.getElementById('btn-submit').style.display = 'none';

            saveState({ started: true, finished: false });
        }

        function goToQuestion(index) {
            if (index < 0 || index >= quizData.length) return;
            currentQuestionIndex = index;
            showQuestion();
            saveState({ started: true, finished: false });
        }

        function prevQuestionNav() {
            if (currentQuestionIndex > 0) {
                goToQuestion(currentQuestionIndex - 1);
            }
        }

        function nextQuestionNav() {
            if (currentQuestionIndex < quizData.length - 1) {
                goToQuestion(currentQuestionIndex + 1);
            }
        }

        function showResults() {
            document.getElementById('quiz-screen').style.display = 'none';
            
            const total = quizData.length;
            correctCount = answers.filter(a => a && a.isCorrect).length;
            incorrectCount = answers.filter(a => a && a.isCorrect === false).length;
            const percentage = Math.round((correctCount / total) * 100);
            
            document.getElementById('count-correct').textContent = correctCount;
            document.getElementById('count-incorrect').textContent = incorrectCount;
            document.getElementById('score-circle').textContent = percentage + '%';
            
            document.getElementById('btn-continue-top').style.display = 'flex';
            document.getElementById('btn-results-top').style.display = 'none';
            document.getElementById('results').style.display = 'block';
            saveState({ started: true, finished: true });
        }

        function restoreFromStorage() {
            let stored = null;
            try {
                stored = JSON.parse(localStorage.getItem(STORAGE_KEY));
            } catch (e) {
                stored = null;
            }
            if (!stored) return;

            if (stored.totalQuestions !== quizData.length) {
                clearState();
                return;
            }

            currentQuestionIndex = stored.currentQuestionIndex || 0;
            correctCount = stored.correctCount || 0;
            incorrectCount = stored.incorrectCount || 0;
            answered = !!stored.answered;
            selectedIndexForCurrent = typeof stored.selectedIndex === 'number' ? stored.selectedIndex : null;
            answers = Array.isArray(stored.answers) ? stored.answers : new Array(quizData.length).fill(null);

            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            document.getElementById('total-q-num').textContent = quizData.length;

            if (stored.finished) {
                showResults();
                document.getElementById('btn-continue-top').style.display = 'flex';
                document.getElementById('btn-results-top').style.display = 'none';
                return;
            }

            showQuestion();
            document.getElementById('btn-continue-top').style.display = 'none';
            document.getElementById('btn-results-top').style.display = 'flex';
        }

        window.addEventListener('load', restoreFromStorage);
    </script>
