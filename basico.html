<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação no Ensino Básico</title>
    <style>
        :root {
            --primary: #0056b3;
            --success: #28a745;
            --error: #dc3545;
            --background: #f4f7f6;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            padding-bottom: 10px;
        }

        .top-reset {
            display: flex;
            justify-content: center;
            margin: 15px 0 10px;
            gap: 10px;
        }

        .top-reset button {
            background-color: var(--primary);
            color: #fff;
            border: none;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4em;
            cursor: pointer;
        }

        .top-reset button:hover {
            filter: brightness(0.9);
        }

        .info {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
            text-align: center;
        }

        .question-card {
            background: var(--card-bg);
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .question-title {
            font-weight: 600;
            font-size: 1.2em;
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .options {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .options li {
            margin-bottom: 10px;
        }

        .option-label {
            display: flex;
            align-items: baseline;
            padding: 15px;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-size: 1.1em;
        }

        .option-label:hover:not(.disabled) {
            background-color: #e2e6ea;
        }

        .option-label.disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        .option-label input {
            margin-right: 15px;
            transform: translateY(2px);
        }

        .btn {
            display: block;
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.2em;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s;
        }

        .btn:hover:not(:disabled) {
            filter: brightness(0.85);
        }

        .btn:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .btn-next {
            background-color: #17a2b8;
        }

        .btn-next:hover:not(:disabled) {
            background-color: #138496;
            filter: none;
        }

        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 5px;
            font-weight: bold;
            display: none;
            font-size: 1.1em;
        }

        .feedback.correct {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .feedback.incorrect {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .option-correct {
            background-color: #d4edda !important;
            border-color: var(--success) !important;
        }

        .option-incorrect {
            background-color: #f8d7da !important;
            border-color: var(--error) !important;
        }

        #results {
            background: var(--card-bg);
            padding: 30px;
            margin-top: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            display: none;
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            font-weight: bold;
            margin: 0 auto 20px;
        }

        .stat-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .stat {
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1.1em;
        }

        .stat-correct {
            background-color: #d4edda;
            color: #155724;
        }

        .stat-incorrect {
            background-color: #f8d7da;
            color: #721c24;
        }

        .progress-container {
            margin-bottom: 20px;
            font-weight: bold;
            text-align: center;
            font-size: 1.2em;
            color: var(--primary);
        }

        .section-header {
            background-color: #e9ecef;
            color: var(--primary);
            padding: 8px 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 0.95em;
            font-weight: bold;
            border-left: 4px solid var(--primary);
        }

        .nav-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-icon {
            width: 46px;
            height: 46px;
            padding: 0;
            font-size: 1.4em;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #btn-submit {
            width: auto;
            margin-top: 0;
            padding: 0 30px;
            height: 46px;
            border-radius: 23px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>

    <h1>Avaliação no Ensino Básico</h1>
    <div class="top-reset">
        <button type="button" onclick="restartQuiz()" aria-label="Reiniciar questionário">&#x21BB;</button>
        <button type="button" id="btn-continue-top" onclick="continueQuiz()" aria-label="Continuar a responder"
            style="display: none;">&#x21AA;</button>
        <button type="button" onclick="window.location.href='index.html'"
            aria-label="Voltar à página inicial">&#x2302;</button>
        <button type="button" id="btn-results-top" onclick="showResults()" aria-label="Ver resultados finais"
            style="display: none;">&#x1F4CB;</button>
    </div>

    <div class="info" id="intro-screen">
        <p>Este questionário interativo contém 100 perguntas baseadas no Regulamento.</p>
        <p><strong>Modo Sequencial:</strong> Terá de responder a uma pergunta de cada vez para poder avançar.</p>
        <button class="btn" onclick="startQuiz()">Iniciar Questionário</button>
        <button class="btn btn-next" style="margin-top: 10px;" onclick="window.location.href='index.html'">Voltar à
            página inicial</button>
    </div>

    <div id="quiz-screen" style="display: none;">
        <div class="progress-container">
            Pergunta <span id="current-q-num">1</span> de <span id="total-q-num">100</span>
        </div>

        <div class="question-card" id="question-card">
            <div id="section-display" class="section-header"></div>
            <div class="question-title" id="question-text"></div>
            <ul class="options" id="options-list"></ul>
            <div class="feedback" id="feedback-msg"></div>
        </div>

        <div class="nav-controls">
            <button type="button" class="btn btn-next btn-icon" id="btn-prev-nav" onclick="prevQuestionNav()"
                aria-label="Pergunta anterior">&#x276E;</button>
            <button type="button" class="btn" id="btn-submit" onclick="submitAnswer()">Responder</button>
            <button type="button" class="btn btn-next btn-icon" id="btn-next-nav" onclick="nextQuestionNav()"
                aria-label="Próxima pergunta">&#x276F;</button>
        </div>
    </div>

    <div id="results">
        <h2>Resultados Finais</h2>
        <div class="score-circle" id="score-circle">0%</div>
        <div class="stat-row">
            <div class="stat stat-correct">Certas: <span id="count-correct">0</span></div>
            <div class="stat stat-incorrect">Erradas: <span id="count-incorrect">0</span></div>
        </div>
    </div>
    <script>
        const quizData = [
            // SECÇÃO I - PROVAS DE MONITORIZAÇÃO DA APRENDIZAGEM - MODA
            { s: "SECÇÃO I - PROVAS DE MONITORIZAÇÃO DA APRENDIZAGEM - MODA", q: "Os alunos que realizam as provas ModA no 4.º e 6.º anos ficam:", o: ["A) Inscritos manualmente pelos encarregados de educação", "B) Automaticamente inscritos, incluindo os do ensino individual", "C) Dispensados de inscrição obrigatória", "D) Inscritos apenas se frequentarem o ensino público"], a: 1 },
            { s: "SECÇÃO I - PROVAS DE MONITORIZAÇÃO DA APRENDIZAGEM - MODA", q: "A decisão de realização das provas ModA por alunos de PLNM (nível A1) é da competência:", o: ["A) Do diretor de turma", "B) Do Ministério da Educação", "C) Do diretor da escola, mediante parecer do conselho pedagógico", "D) Dos encarregados de educação"], a: 2 },
            { s: "SECÇÃO I - PROVAS DE MONITORIZAÇÃO DA APRENDIZAGEM - MODA", q: "Os alunos de PLNM do nível A2 realizam a prova ModA de PLNM em substituição de qual prova?", o: ["A) Prova ModA de Inglês", "B) Prova ModA de História", "C) Prova ModA de Matemática", "D) Prova ModA de Português"], a: 3 },
            { s: "SECÇÃO I - PROVAS DE MONITORIZAÇÃO DA APRENDIZAGEM - MODA", q: "As provas ModA de Inglês e de PLNM são constituídas por quais componentes?", o: ["A) Escrita e prática", "B) Escrita e produção e interação orais", "C) Apenas oral", "D) Escrita e compreensão do oral"], a: 1 },
            { s: "SECÇÃO I - PROVAS DE MONITORIZAÇÃO DA APRENDIZAGEM - MODA", q: "A adaptação «provas a nível de escola» pode ser aplicada na realização das provas ModA?", o: ["A) Sim, em qualquer caso", "B) Sim, com autorização do JNE", "C) Não, com exceção da adaptação «provas a nível de escola»", "D) Apenas no 4.º ano"], a: 2 },
            { s: "SECÇÃO I - PROVAS DE MONITORIZAÇÃO DA APRENDIZAGEM - MODA", q: "O processo de solicitação de adaptações nas provas ModA exige a anuência de quem?", o: ["A) Apenas do diretor da escola", "B) Expressa do encarregado de educação", "C) Do conselho pedagógico", "D) Do aluno"], a: 1 },
            { s: "SECÇÃO I - PROVAS DE MONITORIZAÇÃO DA APRENDIZAGEM - MODA", q: "Os alunos do ensino básico, em situação de surdez severa a profunda, podem realizar, quando aplicável, as provas ModA de Português Língua Segunda (44/62), elaboradas a nível nacional, em substituição das provas ModA de Português (41/61).", o: ["A) PLNM", "B) Inglês", "C) Português (41/61)", "D) Matemática"], a: 2 },
            { s: "SECÇÃO I - PROVAS DE MONITORIZAÇÃO DA APRENDIZAGEM - MODA", q: "Para todas as situações de dislexia ou de perturbação específica da linguagem pode ser aplicada a medida tempo suplementar (30 minutos), para além do tempo de prova, por não estar prevista tolerância regulamentar para as provas ModA.", o: ["A) 15 minutos", "B) 30 minutos", "C) 45 minutos", "D) Não é permitido tempo suplementar"], a: 1 },
            { s: "SECÇÃO I - PROVAS DE MONITORIZAÇÃO DA APRENDIZAGEM - MODA", q: "Onde devem ser publicitadas as pautas de chamada das provas ModA?", o: ["A) Apenas na internet", "B) Apenas na escola frequentada", "C) Na escola frequentada, de inscrição e na de realização", "D) No portal do JNE"], a: 2 },
            { s: "SECÇÃO I - PROVAS DE MONITORIZAÇÃO DA APRENDIZAGEM - MODA", q: "Qual a antecedência mínima para publicitar as pautas de chamada das provas ModA?", o: ["A) 24 horas", "B) 48 horas", "C) 72 horas", "D) 1 semana"], a: 1 },
            { s: "SECÇÃO I - PROVAS DE MONITORIZAÇÃO DA APRENDIZAGEM - MODA", q: "As respostas aos itens de construção das provas ModA são classificadas:", o: ["A) Pelo professor do aluno", "B) Na escola onde realiza a prova", "C) Em suporte digital pela equipa do EduQA, I.P.", "D) Ao nível de agrupamento"], a: 2 },
            { s: "SECÇÃO I - PROVAS DE MONITORIZAÇÃO DA APRENDIZAGEM - MODA", q: "Quem avalia os desempenhos nas provas ModA de Educação Física (48 e 69)?", o: ["A) Um aplicativo automático", "B) O conselho pedagógico", "C) A direção da escola", "D) Dois professores classificadores através de observação direta"], a: 3 },
            { s: "SECÇÃO I - PROVAS DE MONITORIZAÇÃO DA APRENDIZAGEM - MODA", q: "A componente oral da prova ModA de Inglês é classificada por:", o: ["A) Um único professor", "B) Um júri de três docentes", "C) Uma plataforma digital", "D) Dois docentes do 1.º ciclo"], a: 1 },
            { s: "SECÇÃO I - PROVAS DE MONITORIZAÇÃO DA APRENDIZAGEM - MODA", q: "Pode haver reapreciação nas provas ModA?", o: ["A) Sim, mediante requerimento", "B) Sim, com depósito de 25 euros", "C) Não há lugar a reapreciação", "D) Apenas nas questões de construção"], a: 2 },
            { s: "SECÇÃO I - PROVAS DE MONITORIZAÇÃO DA APRENDIZAGEM - MODA", q: "Os resultados do desempenho dos alunos nas provas ModA têm caráter...", o: ["A) Apenas quantitativo", "B) De substituição da nota", "C) Quantitativo e qualitativo", "D) Estritamente punitivo"], a: 2 },
            { s: "SECÇÃO I - PROVAS DE MONITORIZAÇÃO DA APRENDIZAGEM - MODA", q: "A informação dos relatórios as provas ModA é:", o: ["A) Exclusiva para o Ministério da Educação", "B) Complementar às informações geradas pela avaliação interna", "C) Substituta da avaliação formativa", "D) De carácter punitivo"], a: 1 },
            { s: "SECÇÃO I - PROVAS DE MONITORIZAÇÃO DA APRENDIZAGEM - MODA", q: "As provas ModA (Monitorização de Aprendizagem) referem-se principalmente aos anos:", o: ["A) 1.º e 2.º anos", "B) 4.º e 6.º anos", "C) 7.º e 8.º anos", "D) 10.º ano"], a: 1 },

            // SECÇÃO II - PROVAS FINAIS DO ENSINO BÁSICO
            { s: "SECÇÃO II - PROVAS FINAIS DO ENSINO BÁSICO", q: "Os alunos internos do 3.º ciclo devem inscrever-se para as provas finais do ensino básico?", o: ["A) Estão automaticamente inscritos", "B) Devem inscrever-se online", "C) Devem inscrever-se em papel", "D) Apenas se chumbarem"], a: 0 },
            { s: "SECÇÃO II - PROVAS FINAIS DO ENSINO BÁSICO", q: "A inscrição de alunos autopropostos para provas finais é feita:", o: ["A) Na secretaria presencialmente", "B) Online", "C) Por correio", "D) Automaticamente"], a: 1 },
            { s: "SECÇÃO II - PROVAS FINAIS DO ENSINO BÁSICO", q: "Inscrições após o termo dos prazos das provas finais dependem:", o: ["A) Despacho da GNR", "B) Autorização do diretor tendo como limite a véspera das fases", "C) Presidente do IP do EduQA", "D) Ministério da Saúde"], a: 1 },
            { s: "SECÇÃO II - PROVAS FINAIS DO ENSINO BÁSICO", q: "Alunos internos do ensino básico pagam propina para realizar a prova final?", o: ["A) Pagam 10 euros", "B) Pagam 25 euros", "C) Estão isentos do pagamento", "D) Pagam apenas se forem à 2.ª fase"], a: 2 },
            { s: "SECÇÃO II - PROVAS FINAIS DO ENSINO BÁSICO", q: "Um aluno autoproposto fora da escolaridade obrigatória paga quanto por fase nas provas finais?", o: ["A) 5 euros", "B) 10 euros", "C) 15 euros", "D) 20 euros"], a: 1 },
            { s: "SECÇÃO II - PROVAS FINAIS DO ENSINO BÁSICO", q: "O pagamento devido por alunos do ensino básico que se inscrevam nas provas fora do prazo definido é:", o: ["A) 10 euros", "B) 20 euros", "C) 25 euros", "D) 50 euros"], a: 1 },
            { s: "SECÇÃO II - PROVAS FINAIS DO ENSINO BÁSICO", q: "As provas finais do ensino básico são aplicadas em que ano?", o: ["A) 4.º ano", "B) 6.º ano", "C) 9.º ano", "D) 12.º ano"], a: 2 },
            { s: "SECÇÃO II - PROVAS FINAIS DO ENSINO BÁSICO", q: "Alunos com a medida adicional «adaptações curriculares significativas» realizam provas finais para conclusão de ciclo?", o: ["A) Realizam obrigatoriamente", "B) Realizam apenas de Português", "C) Não realizam para efeitos de aprovação e conclusão", "D) Realizam provas a nível de escola"], a: 2 },
            { s: "SECÇÃO II - PROVAS FINAIS DO ENSINO BÁSICO", q: "A prova final do ensino básico de Português, na 1.ª fase para alunos internos, tem componente oral?", o: ["A) Sim, obrigatória", "B) Apenas se o aluno solicitar", "C) É constituída apenas por componente escrita", "D) Depende do agrupamento"], a: 2 },
            { s: "SECÇÃO II - PROVAS FINAIS DO ENSINO BÁSICO", q: "A prova final do ensino básico de PLNM tem componente oral?", o: ["A) Apenas para autopropostos", "B) Não tem componente oral", "C) Tem para alunos internos e autopropostos", "D) Apenas se posicionados no nível A1"], a: 2 },
            { s: "SECÇÃO II - PROVAS FINAIS DO ENSINO BÁSICO", q: "Nas provas finais em suporte digital (Português/PLNM), onde regista o aluno as respostas?", o: ["A) Em folha de papel", "B) Num quadro interativo", "C) Em suporte digital", "D) Em papel ou digital, à escolha"], a: 2 },
            { s: "SECÇÃO II - PROVAS FINAIS DO ENSINO BÁSICO", q: "No 9.º ano, para reunir condições de aprovação, o aluno pode ter disciplinas sem classificação final?", o: ["A) Sim, até duas", "B) Sim, apenas Educação Física", "C) Não pode apresentar disciplinas sem classificação", "D) Sim, em caso de faltas"], a: 2 },
            { s: "SECÇÃO II - PROVAS FINAIS DO ENSINO BÁSICO", q: "Um aluno com nível 1 a Português e Matemática na avaliação sumativa interna:", o: ["A) Vai à 1.ª fase como interno", "B) Vai à 1.ª fase como autoproposto", "C) Não realiza a prova final", "D) Realiza apenas na 2.ª fase"], a: 1 },
            { s: "SECÇÃO II - PROVAS FINAIS DO ENSINO BÁSICO", q: "A 2.ª fase das provas finais do ensino básico destina-se a que alunos?", o: ["A) Apenas para os que faltarem por doença", "B) Aos que não reúnam condições de aprovação após a 1.ª fase", "C) A todos os alunos para melhoria de nota", "D) Aos autopropostos exclusivamente"], a: 1 },
            { s: "SECÇÃO II - PROVAS FINAIS DO ENSINO BÁSICO", q: "A falta a uma componente da prova final na 1.ª fase implica:", o: ["A) Realização apenas dessa componente na 2.ª fase", "B) Aprovação automática", "C) A realização das duas componentes na 2.ª fase", "D) Reprovação de ano automática sem ir à 2.ª fase"], a: 2 },
            { s: "SECÇÃO II - PROVAS FINAIS DO ENSINO BÁSICO", q: "A elaboração das provas finais do ensino básico compete a:", o: ["A) JNE (Júri Nacional de Exames)", "B) EduQA, I. P.", "C) Diretores das Escolas", "D) IAVE"], a: 1 },
            { s: "SECÇÃO II - PROVAS FINAIS DO ENSINO BÁSICO", q: "O júri da prova oral de uma prova final deve incluir:", o: ["A) O professor do aluno", "B) Três docentes, pelo menos dois com habilitação para a disciplina", "C) Um representante dos encarregados", "D) Apenas professores com especialização em educação especial"], a: 1 },
            { s: "SECÇÃO II - PROVAS FINAIS DO ENSINO BÁSICO", q: "As pautas de chamada das provas finais são ordenadas por:", o: ["A) Número de processo", "B) Classificação do período anterior", "C) Turma e número", "D) Ordem alfabética"], a: 3 },
            { s: "SECÇÃO II - PROVAS FINAIS DO ENSINO BÁSICO", q: "O processo de reapreciação nas provas finais é automático se:", o: ["A) Um aluno obtiver nível 4", "B) Reprovar por faltas", "C) A Classificação Final (CFD) for inferior à Classificação Interna Final (CIF)", "D) O diretor solicitar"], a: 2 },
            { s: "SECÇÃO II - PROVAS FINAIS DO ENSINO BÁSICO", q: "Quanto se deposita para pedir reapreciação não automática das provas finais?", o: ["A) 10 euros", "B) 15 euros", "C) 20 euros", "D) 25 euros"], a: 3 },
            { s: "SECÇÃO II - PROVAS FINAIS DO ENSINO BÁSICO", q: "Qual o prazo para entregar requerimento de reapreciação não automática?", o: ["A) 24 horas", "B) 2 dias úteis seguintes à afixação", "C) 5 dias úteis", "D) 1 semana"], a: 1 },
            { s: "SECÇÃO II - PROVAS FINAIS DO ENSINO BÁSICO", q: "Se a nota subir após a reapreciação, o que acontece aos 25 euros?", o: ["A) Reverte para a escola", "B) Fica para o JNE", "C) É restituída ao requerente", "D) Metade é restituída"], a: 2 },
            { s: "SECÇÃO II - PROVAS FINAIS DO ENSINO BÁSICO", q: "Como se efetua a reclamação após a decisão de reapreciação?", o: ["A) Requerimento ao Ministro da Educação", "B) A apresentar ao presidente do JNE via diretor da escola", "C) Diretamente no site do EduQA", "D) Não é possível reclamar"], a: 1 },
            { s: "SECÇÃO II - PROVAS FINAIS DO ENSINO BÁSICO", q: "Nas provas finais do ensino básico, são elaborados pareceres pelos professores especialistas após reclamação?", o: ["A) Sim, sempre", "B) Depende da nota", "C) Não são elaborados pareceres", "D) Apenas para o 1.º ciclo"], a: 2 },
            { s: "SECÇÃO II - PROVAS FINAIS DO ENSINO BÁSICO", q: "Na 1.ª fase das provas finais, os alunos retidos por faltas realizam as provas?", o: ["A) Sim, obrigatoriamente", "B) Não realizam pela aplicação do Estatuto do Aluno", "C) Realizam se pedirem no JNE", "D) Realizam a título condicional"], a: 1 },
            { s: "SECÇÃO II - PROVAS FINAIS DO ENSINO BÁSICO", q: "Na avaliação de Português e PLNM em RVCC as notas usadas para prosseguimento provêm de:", o: ["A) Frequência escolar", "B) Provas orais exclusivas", "C) Provas escritas realizadas", "D) Decisão do formador"], a: 2 },

            { s: "SECÇÃO V - SITUAÇÕES EXCECIONAIS", q: "Alunos do 9.º ano com doença muito grave, avaliados internamente com aproveitamento, podem:", o: ["A) Ser dispensados pela escola", "B) Ser dispensados por despacho do presidente do JNE", "C) Fazer a prova oral apenas", "D) Reprovar administrativamente"], a: 1 },

        const STORAGE_KEY = 'quiz_basico_state_v2';

        let currentQuestionIndex = 0;
        let correctCount = 0;
        let incorrectCount = 0;
        let answered = false;
        let selectedIndexForCurrent = null;
        let answers = new Array(quizData.length).fill(null);

        function updateNavButtons() {
            const prevBtn = document.getElementById('btn-prev-nav');
            const nextBtn = document.getElementById('btn-next-nav');
            if (!prevBtn || !nextBtn) return;

            prevBtn.disabled = currentQuestionIndex === 0;
            nextBtn.disabled = currentQuestionIndex === quizData.length - 1;
        }

        function saveState(extra = {}) {
            const state = {
                currentQuestionIndex,
                correctCount,
                incorrectCount,
                answered,
                selectedIndex: selectedIndexForCurrent,
                answers,
                totalQuestions: quizData.length,
                ...extra
            };
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            } catch (e) {
                // Ignorar erros de armazenamento (por exemplo, navegação privada)
            }
        }

        function clearState() {
            try {
                localStorage.removeItem(STORAGE_KEY);
            } catch (e) { }
        }

        function startQuiz() {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            document.getElementById('total-q-num').textContent = quizData.length;
            currentQuestionIndex = 0;
            correctCount = 0;
            incorrectCount = 0;
            answered = false;
            selectedIndexForCurrent = null;
            answers = new Array(quizData.length).fill(null);
            showQuestion();
            document.getElementById('btn-continue-top').style.display = 'none';
            document.getElementById('btn-results-top').style.display = 'flex';
            saveState({ started: true, finished: false });
        }

        function renderAnsweredState(storedAnswer) {
            const qData = quizData[currentQuestionIndex];
            const feedbackEl = document.getElementById('feedback-msg');

            document.querySelectorAll('.option-label').forEach(label => label.classList.add('disabled'));
            document.querySelectorAll('input[name="current-q"]').forEach(input => {
                input.disabled = true;
                if (storedAnswer && parseInt(input.value) === storedAnswer.selectedIndex) {
                    input.checked = true;
                }
            });

            document.getElementById('label-opt-' + qData.a).classList.add('option-correct');

            if (storedAnswer && storedAnswer.selectedIndex === qData.a) {
                feedbackEl.textContent = "Resposta Correta!";
                feedbackEl.className = "feedback correct";
            } else if (storedAnswer) {
                document.getElementById('label-opt-' + storedAnswer.selectedIndex).classList.add('option-incorrect');
                const correctLetter = qData.o[qData.a] ? qData.o[qData.a].charAt(0) : '';
                feedbackEl.textContent = "Resposta Incorreta! A opção correta é a " + correctLetter + ".";
                feedbackEl.className = "feedback incorrect";
            }

            document.getElementById('btn-submit').style.display = 'none';
        }

        function showQuestion() {
            answered = false;
            selectedIndexForCurrent = null;
            const qData = quizData[currentQuestionIndex];

            document.getElementById('current-q-num').textContent = currentQuestionIndex + 1;

            // Exibir a secção
            document.getElementById('section-display').textContent = qData.s || "Geral";

            document.getElementById('question-text').textContent = (currentQuestionIndex + 1) + ". " + qData.q;

            const optionsList = document.getElementById('options-list');
            optionsList.innerHTML = '';

            qData.o.forEach((opt, index) => {
                const li = document.createElement('li');
                li.innerHTML = '<label class="option-label" id="label-opt-' + index + '">' +
                    '<input type="radio" name="current-q" value="' + index + '">' +
                    '<span>' + opt + '</span>' +
                    '</label>';
                optionsList.appendChild(li);
            });

            document.getElementById('feedback-msg').style.display = 'none';
            document.getElementById('feedback-msg').className = 'feedback';

            document.getElementById('btn-submit').style.display = 'block';
            document.getElementById('btn-submit').disabled = false;

            const storedAnswer = answers[currentQuestionIndex];
            if (storedAnswer) {
                answered = true;
                selectedIndexForCurrent = storedAnswer.selectedIndex;
                document.getElementById('feedback-msg').style.display = 'block';
                renderAnsweredState(storedAnswer);
            }

            updateNavButtons();
        }

        function submitAnswer() {
            if (answered) return;

            const selectedOpt = document.querySelector('input[name="current-q"]:checked');
            if (!selectedOpt) {
                alert("Por favor, selecione uma opção antes de responder.");
                return;
            }

            answered = true;
            document.getElementById('btn-submit').disabled = true;

            const selectedIndex = parseInt(selectedOpt.value);
            const qData = quizData[currentQuestionIndex];
            const feedbackEl = document.getElementById('feedback-msg');

            selectedIndexForCurrent = selectedIndex;

            document.querySelectorAll('.option-label').forEach(label => label.classList.add('disabled'));
            document.querySelectorAll('input[name="current-q"]').forEach(input => input.disabled = true);

            document.getElementById('label-opt-' + qData.a).classList.add('option-correct');

            if (selectedIndex === qData.a) {
                correctCount++;
                feedbackEl.textContent = "Resposta Correta!";
                feedbackEl.className = "feedback correct";
                answers[currentQuestionIndex] = { selectedIndex, isCorrect: true };
            } else {
                incorrectCount++;
                document.getElementById('label-opt-' + selectedIndex).classList.add('option-incorrect');
                const correctLetter = qData.o[qData.a] ? qData.o[qData.a].charAt(0) : '';
                feedbackEl.textContent = "Resposta Incorreta! A opção correta é a " + correctLetter + ".";
                feedbackEl.className = "feedback incorrect";
                answers[currentQuestionIndex] = { selectedIndex, isCorrect: false };
            }

            document.getElementById('btn-submit').style.display = 'none';

            saveState({ started: true, finished: false });
        }

        function goToQuestion(index) {
            if (index < 0 || index >= quizData.length) return;
            currentQuestionIndex = index;
            showQuestion();
            saveState({ started: true, finished: false });
        }

        function prevQuestionNav() {
            if (currentQuestionIndex > 0) {
                goToQuestion(currentQuestionIndex - 1);
            }
        }

        function nextQuestionNav() {
            if (currentQuestionIndex < quizData.length - 1) {
                goToQuestion(currentQuestionIndex + 1);
            }
        }

        function showResults() {
            document.getElementById('quiz-screen').style.display = 'none';

            const total = quizData.length;
            // Recalcular com base nas respostas guardadas
            correctCount = answers.filter(a => a && a.isCorrect).length;
            incorrectCount = answers.filter(a => a && a.isCorrect === false).length;
            const percentage = Math.round((correctCount / total) * 100);

            document.getElementById('count-correct').textContent = correctCount;
            document.getElementById('count-incorrect').textContent = incorrectCount;
            document.getElementById('score-circle').textContent = percentage + '%';

            document.getElementById('btn-continue-top').style.display = 'flex';
            document.getElementById('btn-results-top').style.display = 'none';
            document.getElementById('results').style.display = 'block';
            saveState({ started: true, finished: true });
        }

        function restartQuiz() {
            clearState();
            location.reload();
        }

        function continueQuiz() {
            document.getElementById('results').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            document.getElementById('btn-continue-top').style.display = 'none';
            document.getElementById('btn-results-top').style.display = 'flex';
            saveState({ started: true, finished: false });
        }
        function restoreFromStorage() {
            let stored = null;
            try {
                stored = JSON.parse(localStorage.getItem(STORAGE_KEY));
            } catch (e) {
                stored = null;
            }
            if (!stored) return;

            // Se o número de perguntas mudou, ignorar estado antigo
            if (stored.totalQuestions !== quizData.length) {
                clearState();
                return;
            }

            currentQuestionIndex = stored.currentQuestionIndex || 0;
            correctCount = stored.correctCount || 0;
            incorrectCount = stored.incorrectCount || 0;
            answered = !!stored.answered;
            selectedIndexForCurrent = typeof stored.selectedIndex === 'number' ? stored.selectedIndex : null;
            answers = Array.isArray(stored.answers) ? stored.answers : new Array(quizData.length).fill(null);

            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            document.getElementById('total-q-num').textContent = quizData.length;

            if (stored.finished) {
                showResults();
                document.getElementById('btn-continue-top').style.display = 'flex';
                document.getElementById('btn-results-top').style.display = 'none';
                return;
            }

            showQuestion();
            document.getElementById('btn-continue-top').style.display = 'none';
            document.getElementById('btn-results-top').style.display = 'flex';
        }

        window.addEventListener('load', restoreFromStorage);
    </script>
