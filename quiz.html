<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz de Exames</title>
    <link rel="stylesheet" href="styles/quiz.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="index.html" class="home-link" title="Voltar ao Início">
                <i class="fas fa-home"></i>
            </a>
            <h1 id="header-title">Questões de Exames</h1>
            <div class="top-buttons">
                <button id="btn-restart" class="btn-top" title="Reiniciar">
                    <i class="fas fa-undo"></i>
                </button>
                <button id="btn-continue" class="btn-top" title="Continuar">
                    <i class="fas fa-play"></i>
                </button>
            </div>
        </div>
    </header>

    <main>
        <div id="loading">
            <div class="spinner"></div>
            <p>A carregar perguntas...</p>
        </div>

        <div id="quiz-content" class="quiz-container" style="display: none;">
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            
            <div id="section-title" class="section-title"></div>
            <div id="question-text" class="question-text"></div>
            
            <div id="options-container" class="options-container">
                <!-- Options will be rendered here -->
            </div>

            <div id="feedback-container" class="feedback-container"></div>

            <div class="controls">
                <button id="btn-prev" class="btn btn-prev" disabled>Anterior</button>
                <button id="btn-answer" class="btn btn-answer" disabled>Responder</button>
                <button id="btn-next" class="btn btn-next">Próxima</button>
            </div>
        </div>

        <div id="results" class="quiz-container results-screen">
            <h2>Resultado Final</h2>
            <div id="score-message"></div>
            <div id="final-score" class="score-display">0 / 0</div>
            <div class="controls" style="justify-content: center; gap: 20px;">
                <button onclick="restartQuiz()" class="btn btn-next">Tentar Novamente</button>
                <button onclick="window.location.href='index.html'" class="btn btn-prev">Voltar ao Início</button>
            </div>
        </div>
    </main>

    <script src="scripts/quiz.js"></script>
</body>
</html>
